version: "2"

linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprint
        - (io.Closer).Close
        - (net.Conn).Close
        - os.RemoveAll
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
