version: 2

builds:
  - id: gopherclaw
    main: ./cmd/gopherclaw
    binary: gopherclaw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

  - id: gopherclaw-mcp
    main: ./cmd/gopherclaw-mcp
    binary: gopherclaw-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    files:
      - README.md
      - LICENSE*
      - src: packaging/gopherclaw.plist
        dst: gopherclaw.plist
        strip_parent: true
        info:
          owner: root
          group: root

nfpms:
  - package_name: gopherclaw
    vendor: EMSERO
    homepage: https://github.com/EMSERO/gopherclaw
    maintainer: Brian Brown
    description: AI agent gateway — single binary, multi-channel, multi-model
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: packaging/gopherclaw.plist
        dst: /usr/share/doc/gopherclaw/gopherclaw.plist

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: EMSERO
    name: gopherclaw
  draft: false
  prerelease: auto
  extra_files:
    - glob: packaging/gopherclaw.plist
