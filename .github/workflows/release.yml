name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Test with race detector and coverage
        run: go test -race ./... -coverprofile=coverage.out -count=1 -timeout 180s

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 78" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 78% threshold"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  release:
    needs: [test, lint, security]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Install syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate security report
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          CURR_TAG=${GITHUB_REF_NAME}

          echo "## Security" > /tmp/security-report.md
          echo "" >> /tmp/security-report.md

          # govulncheck status (already passed in the security gate job)
          echo "**govulncheck:** No known vulnerabilities detected in reachable code." >> /tmp/security-report.md
          echo "" >> /tmp/security-report.md

          # Generate current SBOM
          syft dir:. -o cyclonedx-json > /tmp/current.sbom.json

          # Scan current SBOM with grype
          CURR_VULNS=$(grype sbom:/tmp/current.sbom.json -o json 2>/dev/null || true)
          CURR_CVES=$(echo "$CURR_VULNS" | jq -r '.matches[]?.vulnerability.id // empty' 2>/dev/null | sort -u || true)
          CURR_COUNT=$(echo "$CURR_CVES" | grep -c 'CVE\|GHSA' || echo 0)

          if [ "$CURR_COUNT" -gt 0 ]; then
            echo "**Open vulnerabilities ($CURR_COUNT):**" >> /tmp/security-report.md
            echo "" >> /tmp/security-report.md
            echo "$CURR_VULNS" | jq -r '
              .matches[]? |
              "- `\(.vulnerability.id)` (\(.vulnerability.severity // "unknown")) — \(.artifact.name) \(.artifact.version)"
            ' 2>/dev/null | sort -u >> /tmp/security-report.md
            echo "" >> /tmp/security-report.md
          else
            echo "**grype:** No known CVEs in dependencies." >> /tmp/security-report.md
            echo "" >> /tmp/security-report.md
          fi

          # Diff against previous release SBOM if available
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURR_TAG" ]; then
            # Download any SBOM from previous release (pick linux-amd64 as representative)
            PREV_SBOM_NAME="gopherclaw-${PREV_TAG#v}-linux-amd64.sbom.json"
            if gh release download "$PREV_TAG" --pattern "$PREV_SBOM_NAME" --dir /tmp 2>/dev/null; then
              PREV_VULNS=$(grype sbom:/tmp/"$PREV_SBOM_NAME" -o json 2>/dev/null || true)
              PREV_CVES=$(echo "$PREV_VULNS" | jq -r '.matches[]?.vulnerability.id // empty' 2>/dev/null | sort -u || true)

              # Resolved = in previous but not in current
              RESOLVED=$(comm -23 <(echo "$PREV_CVES") <(echo "$CURR_CVES") || true)
              # New = in current but not in previous
              NEW=$(comm -13 <(echo "$PREV_CVES") <(echo "$CURR_CVES") || true)

              if [ -n "$RESOLVED" ] && [ "$(echo "$RESOLVED" | grep -c 'CVE\|GHSA')" -gt 0 ]; then
                echo "**Resolved since ${PREV_TAG}:**" >> /tmp/security-report.md
                echo "" >> /tmp/security-report.md
                echo "$RESOLVED" | while read -r cve; do
                  [ -n "$cve" ] || continue
                  DETAIL=$(echo "$PREV_VULNS" | jq -r --arg id "$cve" '
                    .matches[]? | select(.vulnerability.id == $id) |
                    "(\(.vulnerability.severity // "unknown")) — \(.artifact.name) \(.artifact.version)"
                  ' 2>/dev/null | head -1)
                  echo "- \`${cve}\` ${DETAIL}" >> /tmp/security-report.md
                done
                echo "" >> /tmp/security-report.md
              fi

              if [ -n "$NEW" ] && [ "$(echo "$NEW" | grep -c 'CVE\|GHSA')" -gt 0 ]; then
                echo "**New since ${PREV_TAG}:**" >> /tmp/security-report.md
                echo "" >> /tmp/security-report.md
                echo "$NEW" | while read -r cve; do
                  [ -n "$cve" ] || continue
                  DETAIL=$(echo "$CURR_VULNS" | jq -r --arg id "$cve" '
                    .matches[]? | select(.vulnerability.id == $id) |
                    "(\(.vulnerability.severity // "unknown")) — \(.artifact.name) \(.artifact.version)"
                  ' 2>/dev/null | head -1)
                  echo "- \`${cve}\` ${DETAIL}" >> /tmp/security-report.md
                done
                echo "" >> /tmp/security-report.md
              fi
            fi
          fi

          echo "**SBOM:** CycloneDX JSON attached for each archive artifact." >> /tmp/security-report.md
          echo "" >> /tmp/security-report.md

          # Set as env var for GoReleaser
          {
            echo 'SECURITY_REPORT<<EOF'
            cat /tmp/security-report.md
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> 2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
